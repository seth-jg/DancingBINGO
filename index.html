<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dancing Bingo</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:linear-gradient(135deg,#1a2a6c,#b21f1f,#1a2a6c);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
color:white;
}

.container{
max-width:600px;
width:100%;
background:rgba(0,0,0,0.7);
border-radius:15px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-top:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#ffcc00;
text-shadow:0 0 10px rgba(255,204,0,0.5);
}

.game-info{
display:flex;
justify-content:space-between;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.status{
background:rgba(0,0,0,0.5);
padding:10px 15px;
border-radius:8px;
flex:1;
min-width:200px;
text-align:center;
font-weight:bold;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

button{
background:linear-gradient(to bottom,#ffcc00,#ff9900);
border:none;
padding:10px 20px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
transition:all 0.3s;
box-shadow:0 4px 8px rgba(0,0,0,0.3);
min-height:44px;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 6px 12px rgba(0,0,0,0.4);
}

button:active{
transform:translateY(1px);
}

#bingoCard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin:20px 0;
}

.tile{
background:linear-gradient(145deg,#2c3e50,#1a2530);
border:2px solid #ffcc00;
border-radius:10px;

aspect-ratio:1/1;

padding:8px;
font-weight:bold;

display:flex;
align-items:center;
justify-content:center;

text-align:center;
word-break:break-word;

font-size:clamp(12px,2.5vw,18px);

cursor:pointer;
transition:all 0.3s;

box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

.tile:hover{
transform:scale(1.05);
background:linear-gradient(145deg,#34495e,#2c3e50);
}

.tile.selected{
background:linear-gradient(145deg,#ff9900,#ff6600);
transform:scale(1.05);
box-shadow:0 0 15px rgba(255,153,0,0.7);
}

.tile.bingo{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="container">

<h1>Dancing Bingo</h1>

<div class="game-info">

<div class="status" id="status">
Select 4 in a row to win!
</div>

<div class="controls">
<button id="shuffleBtn">Shuffle Cards</button>
<button id="resetBtn">Reset Game</button>
</div>

</div>

<div id="bingoCard"></div>

</div>

<script>

const allItems=[
"Rock and roll stroll",
"Jive",
"Country Two Step",
"Nightclub Slow Dance",
"Rumba Blues",
"Night Fever Stroll",
"East Coast Swing",
"Shivers stroll",
"West Coast Swing",
"Hustle",
"Carolina Blues",
"Madison",
"Blango",
"Shake your tail feathers",
"UK Blues",
"Carolina Shag"
];

let selectedItems=[];
let selectedTiles=[];
let hasWon=false;



function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}



function createBingoCard(){

const cardElement=document.getElementById("bingoCard");

cardElement.innerHTML="";

let stored=localStorage.getItem("bingoItems");

if(stored){

selectedItems=JSON.parse(stored);

}else{

selectedItems=shuffle([...allItems]).slice(0,16);

localStorage.setItem("bingoItems",JSON.stringify(selectedItems));

}

selectedItems.forEach((item,index)=>{

const tile=document.createElement("div");

tile.className="tile";

tile.textContent=item;

tile.dataset.index=index;

tile.addEventListener("click",()=>toggleTile(tile,index));

cardElement.appendChild(tile);

});

selectedTiles=[];

hasWon=false;

document.getElementById("status").textContent="Select 4 in a row to win!";

}



function toggleTile(tile,index){

if(hasWon)return;

if(selectedTiles.includes(index)){

selectedTiles=selectedTiles.filter(i=>i!==index);

tile.classList.remove("selected");

}else{

selectedTiles.push(index);

tile.classList.add("selected");

}

if(selectedTiles.length>=4){

checkWinCondition();

}

}



function checkWinCondition(){

const grid=Array(4).fill().map(()=>Array(4).fill(false));

selectedTiles.forEach(index=>{

const row=Math.floor(index/4);

const col=index%4;

grid[row][col]=true;

});

for(let row=0;row<4;row++){

if(grid[row].every(cell=>cell)){

winGame();

return;

}

}

for(let col=0;col<4;col++){

if(grid.every(row=>row[col])){

winGame();

return;

}

}

if(grid[0][0]&&grid[1][1]&&grid[2][2]&&grid[3][3]){

winGame();

return;

}

if(grid[0][3]&&grid[1][2]&&grid[2][1]&&grid[3][0]){

winGame();

return;

}

document.getElementById("status").textContent=`Selected ${selectedTiles.length} tiles. Keep going!`;

}



function winGame(){

hasWon=true;

document.getElementById("status").innerHTML="🎉 BINGO! 🎉";

document.querySelectorAll(".tile.selected").forEach(tile=>{

tile.classList.add("bingo");

});

}



document.getElementById("shuffleBtn").addEventListener("click",()=>{

localStorage.removeItem("bingoItems");

createBingoCard();

});



document.getElementById("resetBtn").addEventListener("click",()=>{

selectedTiles=[];

hasWon=false;

document.querySelectorAll(".tile").forEach(tile=>{

tile.classList.remove("selected","bingo");

});

document.getElementById("status").textContent="Select 4 in a row to win!";

});



createBingoCard();

</script>

</body>
</html>
